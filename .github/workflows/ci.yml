name: CI

on: 
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
     - README.md
     - 'helm/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: 1.22
    
    - name: Build
      run: go build -o go-web-app

    - name: Test
      run: go test ./...

  # code-quality:
  #   runs-on: ubuntu-latest

  #   steps:
  #   - name: Checkout repository
  #     uses: actions/checkout@v4

  #   - name: Run golangci-init
  #     uses: golangci/golangci-lint-action@v4
  #     with:
  #       version: v1.59.0

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/go-web-app:${{github.run_id}}

    
  update-newtage-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update image tag in Helm chart values.yaml
      run: |
        sed -i "s/tag: .*/tag: "${{github.run_id}}"/" helm/go-web-app-chart/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.name "Sushant Lama"
        git config --global user.email "sushantlama732@gmail.com"
        git add helm/go-web-app-chart/values.yaml
        git commit -m "Update image tag to ${{github.run_id}} in Helm chart"
        git push 



